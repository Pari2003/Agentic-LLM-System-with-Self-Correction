version: "3.9"

services:
  # ─── Ollama LLM Server ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_rag
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped

  # ─── Neo4j Graph Database ───────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: neo4j_graphrag
    ports:
      - "7474:7474"   # HTTP (Neo4j Browser)
      - "7687:7687"   # Bolt (Driver)
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 128m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 128m
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ─── Agentic RAG Application ────────────────────────────
  app:
    build: .
    container_name: agentic_rag_app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - CHROMADB_PATH=/app/data/chromadb
      - SQLITE_PATH=/app/data/metadata.db
    volumes:
      - app_data:/app/data
    depends_on:
      - ollama
      - neo4j
    restart: unless-stopped

volumes:
  ollama_data:
  neo4j_data:
  app_data:
